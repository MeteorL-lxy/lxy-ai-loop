    "output_count": 1,
    "episode_probe_retry_count": 1,
    "target_width": 720,
    "target_height": 1280,
    "submit_timeout": 90,
    "task_timeout": 1800,
    "poll_interval": 3
  },
  "runtime": {
    "default_publish_platforms": [],
    "clip_execute_concurrency": 3,
    "publish_execute_concurrency": 2,
    "collect_wait_seconds": 180,
    "collect_poll_interval": 15,
    "cleanup_local_clips_after_publish": true
  },
  "paths": {
    "logs_dir": "runtime/flywheel-experiments/yourchannel/logs",
    "source_dir": "runtime/flywheel-experiments/yourchannel/source",
    "clipped_dir": "runtime/flywheel-experiments/yourchannel/clipped",
    "covers_dir": "runtime/flywheel-experiments/yourchannel/covers"
  }
