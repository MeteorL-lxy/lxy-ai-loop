{
  "local_db": {
    "path": "runtime/flywheel-experiments/yourchannel/flywheel.db"
  },
  "flywheel": {
    "candidate_pool_size": 80,
    "candidate_page_size": 50,
    "default_platform": "yourchannel_drama",
    "default_language": "",
    "candidate_language_mode": "all",
    "candidate_languages": [],
    "default_order": "publish_at"
  },
  "realtime_rank": {
    "enabled": false,
    "base_url": "https://test-api-ai-guangdada.inbeidou.cn",
    "timeout_seconds": 180,
    "max_candidates": 0
  },
  "scoring": {
    "weights": {
      "alpha": 0.2,
      "beta": 0.2,
      "gamma": 0.2,
      "delta": 0.15,
      "epsilon": 0.1,
      "zeta": 0.15,
      "ucb_c": 1.0
    }
  },
  "selection": {
    "recent_hard_exclusion_rounds": 20,
    "recent_hard_exclusion_days": 7
  },
  "clipping": {
    "default_episode_order": 1,
    "require_third_serial_id": true,
    "cut_type": "high_cut",
