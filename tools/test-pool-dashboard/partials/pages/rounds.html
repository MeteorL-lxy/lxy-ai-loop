<section class="panel" id="rounds-panel">
  <div class="section-head">
    <div class="section-head-main">
      <h2>轮次归档明细</h2>
      <span class="section-kicker">归档查询</span>
    </div>
  </div>
  <div class="filters">
    <select id="day-filter"><option value="">全部日期</option></select>
    <select id="mode-filter"><option value="">全部模式</option></select>
    <select id="line-filter"><option value="">全部线路</option></select>
    <select id="status-filter"><option value="">全部状态</option></select>
    <input id="search-input" type="text" placeholder="搜索轮次 / 备注 / 账号池" />
    <button id="search-btn" class="primary-btn">查询</button>
  </div>
  <div class="table-wrap">
    <table class="data-table rounds-table">
      <thead>
        <tr>
          <th>时间</th>
          <th>线路</th>
          <th>轮次</th>
          <th>结果概览</th>
          <th>本轮判断</th>
          <th>主要问题</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="rounds-tbody"></tbody>
    </table>
  </div>
  <div class="pagination-bar">
    <div id="rounds-page-info" class="pagination-info">尚未加载轮次明细</div>
    <div class="pagination-actions">
      <label class="page-size">
        <span>每页</span>
        <select id="page-size-select">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </label>
      <button id="prev-page-btn" class="ghost-btn">上一页</button>
      <button id="next-page-btn" class="ghost-btn">下一页</button>
    </div>
  </div>
</section>
